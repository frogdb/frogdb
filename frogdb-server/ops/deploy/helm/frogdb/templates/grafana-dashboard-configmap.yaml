{{- if .Values.grafana.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frogdb.fullname" . }}-grafana-dashboard
  labels:
    {{- include "frogdb.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  frogdb-overview.json: |-
    {{- .Files.Get "dashboards/frogdb-overview.json" | nindent 4 }}
{{- end }}
