[package]
name = "frogdb-telemetry"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
authors.workspace = true
repository.workspace = true
description = "Telemetry, metrics, and observability for FrogDB"

[features]
default = []
testing = ["dep:reqwest", "opentelemetry_sdk/testing"]

[dependencies]
frogdb-core = { path = "../core" }
frogdb-metrics-derive = { path = "../metrics-derive" }

# Prometheus
prometheus = "0.14"

# OpenTelemetry
opentelemetry = { version = "0.31", features = ["metrics"] }
opentelemetry_sdk = { version = "0.31", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.31", features = ["metrics", "grpc-tonic"] }

# HTTP response types (for handler functions)
hyper = { version = "1", features = ["http1", "server"] }
http-body-util = "0.1"

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }

# Concurrent data structures
dashmap = "6"
parking_lot = "0.12"

# Task-level profiling
tokio-metrics = { workspace = true }

# System info
sysinfo = "0.33"

# CPU time (getrusage)
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Bytes
bytes = { workspace = true }

# HTTP client for testing (optional)
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"], optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"
bytes = { workspace = true }
frogdb-telemetry = { path = ".", features = ["testing"] }
