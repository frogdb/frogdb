<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrogDB Debug</title>
    <link rel="stylesheet" href="/debug/assets/css/simple.min.css">
    <link rel="stylesheet" href="/debug/assets/css/style.css">
    <link rel="stylesheet" href="/debug/assets/css/uPlot.min.css">
    <script src="/debug/assets/js/htmx.min.js"></script>
    <script src="/debug/assets/js/uPlot.min.js"></script>
</head>
<body>
    <header>
        <h1>FrogDB Debug</h1>
        <nav>
            <a href="#overview" class="current" data-tab="overview">Overview</a>
            <a href="#metrics" data-tab="metrics">Metrics</a>
            <a href="#clients" data-tab="clients">Clients</a>
            <a href="#performance" data-tab="performance">Performance</a>
            <a href="#cluster" data-tab="cluster">Cluster</a>
            <a href="#bundles" data-tab="bundles">Bundles</a>
        </nav>
    </header>

    <main>
        <div id="overview"
            hx-get="/debug/partials/overview"
            hx-trigger="load, every 5s"
            hx-swap="innerHTML">
            <p class="loading">Loading overview...</p>
        </div>

        <div id="metrics" style="display:none">
            <div id="metrics-charts"
                hx-get="/debug/partials/metrics-charts"
                hx-trigger="revealed once"
                hx-swap="innerHTML">
                <p class="loading">Loading charts...</p>
            </div>
        </div>

        <div id="clients" style="display:none"
            hx-get="/debug/partials/clients"
            hx-trigger="revealed, every 5s"
            hx-swap="innerHTML">
            <p class="loading">Loading clients...</p>
        </div>

        <div id="performance" style="display:none"
            hx-get="/debug/partials/performance"
            hx-trigger="revealed, every 5s"
            hx-swap="innerHTML">
            <p class="loading">Loading performance data...</p>
        </div>

        <div id="cluster" style="display:none"
            hx-get="/debug/partials/cluster-tab"
            hx-trigger="revealed, every 5s"
            hx-swap="innerHTML">
            <p class="loading">Loading cluster info...</p>
        </div>

        <div id="bundles" style="display:none"
            hx-get="/debug/partials/bundles"
            hx-trigger="revealed, every 10s"
            hx-swap="innerHTML">
            <p class="loading">Loading bundles...</p>
        </div>
    </main>

    <script src="/debug/assets/js/charts.js"></script>
    <script>
        // Tab navigation
        document.querySelectorAll('nav a[data-tab]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const tab = link.dataset.tab;

                // Update active nav
                document.querySelectorAll('nav a[data-tab]').forEach(l => l.classList.remove('current'));
                link.classList.add('current');

                // Show/hide sections
                document.querySelectorAll('main > div[id]').forEach(s => {
                    s.style.display = s.id === tab ? '' : 'none';
                });

                // Trigger HTMX load for newly visible section
                const section = document.getElementById(tab);
                if (section) htmx.trigger(section, 'revealed');

                // Start/stop chart polling
                if (tab === 'metrics') {
                    FrogDBCharts.start();
                } else {
                    FrogDBCharts.stop();
                }
            });
        });

        // Bundle generation
        window.addEventListener('generate-bundle', async (e) => {
            const duration = e.detail || '0';
            const btn = document.querySelector('#bundles button');
            if (btn) {
                btn.disabled = true;
                btn.textContent = duration === '0' ? 'Generating...' : `Collecting (${duration}s)...`;
            }

            try {
                const resp = await fetch(`/debug/api/bundle/generate?duration=${duration}`);
                if (resp.ok) {
                    const blob = await resp.blob();
                    const id = resp.headers.get('X-Bundle-Id') || 'bundle';
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `frogdb-bundle-${id}.zip`;
                    a.click();
                    URL.revokeObjectURL(url);

                    // Refresh bundle list
                    htmx.trigger(document.getElementById('bundles'), 'revealed');
                }
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Generate Bundle';
                }
            }
        });
    </script>
</body>
</html>
