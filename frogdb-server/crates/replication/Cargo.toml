[package]
name = "frogdb-replication"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Replication protocol for FrogDB primary-replica streaming"

[dependencies]
bytes.workspace = true
tokio.workspace = true
tokio-util.workspace = true
frogdb-protocol.workspace = true
redis-protocol.workspace = true
frogdb-types.workspace = true
frogdb-persistence.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
hex.workspace = true
parking_lot.workspace = true
tracing.workspace = true
thiserror.workspace = true
rand.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "test-util"] }
# test-support exposes RocksStore's single-key put/get accessors to the
# replica_session full-sync tests; dev-only, kept out of the production build by
# resolver "2".
frogdb-persistence = { workspace = true, features = ["test-support"] }
tempfile.workspace = true
serde_json.workspace = true
proptest.workspace = true
