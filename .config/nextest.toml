[profile.default]
# Mark tests as slow after 5s, terminate after 15s (3 × 5s)
slow-timeout = { period = "5s", terminate-after = 3 }
# Run all tests even if some fail
fail-fast = false
# Each test spawns a multi-shard server consuming ~10+ ephemeral ports.
# macOS has only ~16K ephemeral ports (49152-65535) with 60s TIME_WAIT,
# so high parallelism exhausts the pool (EADDRNOTAVAIL). Cap at 8 threads
# to keep steady-state port usage well under the limit.
test-threads = 8

# Cluster tests spin up multi-node Raft clusters (3-7 nodes each) that are
# CPU- and port-intensive. Limit concurrency so they don't starve each other
# or lighter tests for resources.
[test-groups.cluster]
max-threads = 2

# Cluster integration tests need 5-80s solo and even longer under parallel
# load. Give them 30s slow / 120s hard kill, cap concurrency via test group,
# and allow retries for transient resource-contention failures.
[[profile.default.overrides]]
filter = "test(integration_cluster::)"
slow-timeout = { period = "30s", terminate-after = 4 }
test-group = "cluster"
retries = 2

# Replication tests also spin up multi-server topologies and can exceed the
# default 15s timeout under load.
[[profile.default.overrides]]
filter = "test(integration_replication::)"
slow-timeout = { period = "15s", terminate-after = 3 }

# TLS/HTTPS tests wait for the HTTPS listener to start, which can be slow
# on ARM64 CI runners (TLS key generation + listener startup).
[[profile.default.overrides]]
filter = "test(integration_tls_extended::)"
slow-timeout = { period = "15s", terminate-after = 4 }

# Property-based tests (proptest) can be slow, especially on CI runners.
# Give them more headroom to avoid spurious timeouts.
[[profile.default.overrides]]
filter = "test(property_tests::)"
slow-timeout = { period = "15s", terminate-after = 4 }

# The generated-workload seed sweep drives ~20 seeded turmoil sims back-to-back,
# each spinning a multi-shard server, running the full invariant pipeline, and
# probing the four DEBUG quiescence commands. That is legitimately >15s in debug,
# so give it generous headroom (the individual sub-runs are fast; it is the
# 20× repetition that accumulates).
[[profile.default.overrides]]
filter = "test(concurrency_workload::seed_sweep)"
slow-timeout = { period = "30s", terminate-after = 4 }

# HyperLogLog cardinality tests add tens of thousands of elements over the
# socket (sparse→dense promotion + repeated PFCOUNT) and run ~14s in debug —
# right at the default 15s hard kill, so they tip over under parallel load.
# They are legitimately heavy, not flaky: Tier 1/2 write-amplification work
# shrinks per-element persistence cost, but the all-distinct worst case still
# round-trips tens of thousands of elements, so keep generous headroom.
[[profile.default.overrides]]
filter = "test(tcl_pfcount_multiple_keys_merge) | test(tcl_hll_large_element)"
slow-timeout = { period = "30s", terminate-after = 3 }
