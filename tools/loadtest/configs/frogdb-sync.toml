# FrogDB Sync Durability Configuration
#
# Maximum durability, lowest throughput.
# Every write is synced to disk before acknowledging.
# No data loss on crash.
#
# Use case: Financial transactions, critical data.

[server]
bind = "127.0.0.1"
port = 6379
num_shards = 4

[persistence]
enabled = true
data_dir = "/tmp/frogdb-bench-sync"
durability_mode = "sync"
write_buffer_size_mb = 64
compression = "lz4"
# Small batch - flush frequently
batch_size_threshold_kb = 1
batch_timeout_ms = 0

[snapshot]
enabled = false

[logging]
level = "warn"

[metrics]
enabled = false

[memory]
maxmemory = "0"  # No limit for benchmarks
