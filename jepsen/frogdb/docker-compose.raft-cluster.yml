    environment:
      FROGDB_SERVER__BIND: "0.0.0.0"
      FROGDB_SERVER__PORT: 6379
      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.3:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.3:16379"
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.3

  n3:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n3
