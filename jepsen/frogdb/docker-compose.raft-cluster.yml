# Jepsen 5-node Raft cluster for FrogDB
# Used for Raft consensus and distributed systems testing
#
# Topology:
#   n1, n2, n3 - Initial Raft cluster members (quorum = 2)
#   n4, n5     - Available for membership change tests
#
# Ports (from host):
#   n1: localhost:6379 (client), localhost:16379 (cluster bus)
#   n2: localhost:6380 (client), localhost:16380 (cluster bus)
#   n3: localhost:6381 (client), localhost:16381 (cluster bus)
#   n4: localhost:6382 (client), localhost:16382 (cluster bus)
#   n5: localhost:6383 (client), localhost:16383 (cluster bus)
#
# Network: 172.21.0.0/16 subnet (separate from replication cluster)

services:
  n1:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n1
    hostname: n1
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - frogdb-raft-n1-data:/data
      - /tmp/frogdb-raft-n1:/tmp/frogdb
    environment:
      FROGDB_SERVER__BIND: "0.0.0.0"
      FROGDB_SERVER__PORT: 6379
      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.2:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.2:16379"
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN   # For iptables-based partition testing and tc/netem
      - SYS_PTRACE  # For process manipulation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.2

  n2:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n2
    hostname: n2
    ports:
      - "6380:6379"
      - "16380:16379"
    volumes:
      - frogdb-raft-n2-data:/data
