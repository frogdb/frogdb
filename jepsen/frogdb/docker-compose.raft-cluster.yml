      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.6

volumes:
  frogdb-raft-n1-data:
  frogdb-raft-n2-data:
  frogdb-raft-n3-data:
  frogdb-raft-n4-data:
  frogdb-raft-n5-data:

networks:
  frogdb-raft-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
