      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.4:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.4:16379"
      FROGDB_CLUSTER__INITIAL_NODES: '["172.21.0.2:16379","172.21.0.3:16379","172.21.0.4:16379"]'
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.4

  n4:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n4
    hostname: n4
    ports:
      - "${FROGDB_PORT_N4:-16382}:6379"
      - "${FROGDB_BUS_PORT_N4:-26382}:16379"
