# Jepsen 5-node Raft cluster for FrogDB
# Used for Raft consensus and distributed systems testing
#
# Topology:
#   n1, n2, n3 - Initial Raft cluster members (quorum = 2)
#   n4, n5     - Available for membership change tests
#
# Ports (from host, default base=16379):
#   n1: localhost:16379 (client), localhost:26379 (cluster bus)
#   n2: localhost:16380 (client), localhost:26380 (cluster bus)
#   n3: localhost:16381 (client), localhost:26381 (cluster bus)
#   n4: localhost:16382 (client), localhost:26382 (cluster bus)
#   n5: localhost:16383 (client), localhost:26383 (cluster bus)
#
# Network: 172.21.0.0/16 subnet (separate from replication cluster)

services:
  n1:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n1
    hostname: n1
    ports:
      - "${FROGDB_PORT_N1:-16379}:6379"
      - "${FROGDB_BUS_PORT_N1:-26379}:16379"
    volumes:
      - frogdb-raft-n1-data:/data
      - /tmp/frogdb-raft-n1:/tmp/frogdb
    environment:
      FROGDB_SERVER__BIND: "0.0.0.0"
      FROGDB_SERVER__PORT: 6379
      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.2:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.2:16379"
      FROGDB_CLUSTER__INITIAL_NODES: '["172.21.0.2:16379","172.21.0.3:16379","172.21.0.4:16379"]'
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN   # For iptables-based partition testing and tc/netem
      - SYS_PTRACE  # For process manipulation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.2

  n2:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n2
    hostname: n2
    ports:
      - "${FROGDB_PORT_N2:-16380}:6379"
      - "${FROGDB_BUS_PORT_N2:-26380}:16379"
    volumes:
      - frogdb-raft-n2-data:/data
      - /tmp/frogdb-raft-n2:/tmp/frogdb
    environment:
      FROGDB_SERVER__BIND: "0.0.0.0"
      FROGDB_SERVER__PORT: 6379
      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.3:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.3:16379"
      FROGDB_CLUSTER__INITIAL_NODES: '["172.21.0.2:16379","172.21.0.3:16379","172.21.0.4:16379"]'
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.3

  n3:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n3
    hostname: n3
