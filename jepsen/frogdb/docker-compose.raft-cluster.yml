      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.5:16379"
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      frogdb-raft-net:
        ipv4_address: 172.21.0.5

  n5:
    image: frogdb:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: frogdb-raft-n5
    hostname: n5
    ports:
      - "${FROGDB_PORT_N5:-16383}:6379"
      - "${FROGDB_BUS_PORT_N5:-26383}:16379"
    volumes:
      - frogdb-raft-n5-data:/data
      - /tmp/frogdb-raft-n5:/tmp/frogdb
    environment:
      FROGDB_SERVER__BIND: "0.0.0.0"
      FROGDB_SERVER__PORT: 6379
      FROGDB_PERSISTENCE__DATA_DIR: /data
      FROGDB_CLUSTER__ENABLED: "true"
      FROGDB_CLUSTER__CLIENT_ADDR: "172.21.0.6:6379"
      FROGDB_CLUSTER__CLUSTER_BUS_ADDR: "172.21.0.6:16379"
      FROGDB_CLUSTER__DATA_DIR: /data/cluster
    cap_add:
