<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrogDB Debug Dashboard</title>
  <link rel="stylesheet" href="/debug/assets/css/chota.min.css">
  <link rel="stylesheet" href="/debug/assets/css/uPlot.min.css">
  <link rel="stylesheet" href="/debug/assets/css/style.css">
</head>
<body x-data="debugDashboard()">
  <div class="container">
    <header class="header">
      <h1>FrogDB Debug Dashboard</h1>
      <span class="version" x-text="'v' + serverInfo.version"></span>
    </header>

    <nav class="tabs is-full">
      <a :class="{ 'active': tab === 'cluster' }" @click="tab = 'cluster'">Cluster</a>
      <a :class="{ 'active': tab === 'config' }" @click="tab = 'config'">Config</a>
      <a :class="{ 'active': tab === 'metrics' }" @click="tab = 'metrics'">Metrics</a>
      <a :class="{ 'active': tab === 'slowlog' }" @click="tab = 'slowlog'">Slowlog</a>
      <a :class="{ 'active': tab === 'latency' }" @click="tab = 'latency'">Latency</a>
      <a :class="{ 'active': tab === 'bundles' }" @click="tab = 'bundles'">Bundles</a>
    </nav>

    <!-- Cluster Tab -->
    <div x-show="tab === 'cluster'" x-cloak>
      <div
        hx-get="/debug/partials/cluster"
        hx-trigger="load, every 5s"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading cluster info</div>
      </div>
    </div>

    <!-- Config Tab -->
    <div x-show="tab === 'config'" x-cloak>
      <div
        hx-get="/debug/partials/config"
        hx-trigger="load"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading configuration</div>
      </div>
    </div>

    <!-- Metrics Tab -->
    <div x-show="tab === 'metrics'" x-cloak>
      <div
        id="metrics-container"
        hx-get="/debug/partials/metrics"
        hx-trigger="load, every 2s"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading metrics</div>
      </div>

      <div class="row">
        <div class="col">
          <div class="chart-container">
            <div class="chart-title">Throughput (ops/sec)</div>
            <div id="chart-throughput"></div>
          </div>
        </div>
        <div class="col">
          <div class="chart-container">
            <div class="chart-title">Latency (ms)</div>
            <div id="chart-latency"></div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <div class="chart-container">
            <div class="chart-title">Memory Usage (MB)</div>
            <div id="chart-memory"></div>
          </div>
        </div>
        <div class="col">
          <div class="chart-container">
            <div class="chart-title">Connections</div>
            <div id="chart-connections"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Slowlog Tab -->
    <div x-show="tab === 'slowlog'" x-cloak>
      <div
        hx-get="/debug/partials/slowlog"
        hx-trigger="load, every 10s"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading slowlog</div>
      </div>
    </div>

    <!-- Latency Tab -->
    <div x-show="tab === 'latency'" x-cloak>
      <div
        hx-get="/debug/partials/latency"
        hx-trigger="load, every 5s"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading latency data</div>
      </div>
    </div>

    <!-- Bundles Tab -->
    <div x-show="tab === 'bundles'" x-cloak>
      <div
        id="bundles-container"
        hx-get="/debug/partials/bundles"
        hx-trigger="load, bundleRefresh from:body"
        hx-swap="innerHTML"
      >
        <div class="loading">Loading bundles...</div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/debug/assets/js/htmx.min.js"></script>
  <script src="/debug/assets/js/alpine.min.js" defer></script>
  <script src="/debug/assets/js/uPlot.min.js"></script>

  <script>
    // Chart data storage
    const chartData = {
      throughput: { timestamps: [], values: [] },
      latency: { timestamps: [], p50: [], p95: [], p99: [] },
      memory: { timestamps: [], used: [], peak: [] },
      connections: { timestamps: [], current: [] }
    };

    // Chart instances
    let charts = {};
    const MAX_POINTS = 60; // 2 minutes at 2s intervals

    // uPlot chart options factory
    function createChartOpts(title, series, width = 500, height = 200) {
      return {
        width,
        height,
        scales: {
          x: { time: true },
          y: { auto: true }
        },
        axes: [
          {
            stroke: '#a0a0a0',
            grid: { stroke: '#2d3a5a', width: 1 }
          },
          {
            stroke: '#a0a0a0',
            grid: { stroke: '#2d3a5a', width: 1 }
          }
        ],
        series: [
          {},
          ...series
        ]
      };
    }

    // Initialize charts when metrics tab is shown
    function initCharts() {
      if (charts.throughput) return; // Already initialized

      const throughputEl = document.getElementById('chart-throughput');
      const latencyEl = document.getElementById('chart-latency');
      const memoryEl = document.getElementById('chart-memory');
      const connectionsEl = document.getElementById('chart-connections');

      if (!throughputEl || !latencyEl || !memoryEl || !connectionsEl) return;

      const width = Math.min(throughputEl.clientWidth || 500, 600);

      // Throughput chart
      charts.throughput = new uPlot(
        createChartOpts('Throughput', [
          { stroke: '#2ecc71', label: 'ops/sec', fill: 'rgba(46, 204, 113, 0.1)' }
        ], width),
        [[], []],
        throughputEl
      );

      // Latency chart (p50, p95, p99)
      charts.latency = new uPlot(
        createChartOpts('Latency', [
          { stroke: '#3498db', label: 'p50' },
          { stroke: '#f39c12', label: 'p95' },
          { stroke: '#e74c3c', label: 'p99' }
        ], width),
        [[], [], [], []],
        latencyEl
      );

      // Memory chart
      charts.memory = new uPlot(
        createChartOpts('Memory', [
          { stroke: '#9b59b6', label: 'used', fill: 'rgba(155, 89, 182, 0.1)' },
          { stroke: '#e74c3c', label: 'peak' }
        ], width),
        [[], [], []],
        memoryEl
      );

      // Connections chart
      charts.connections = new uPlot(
        createChartOpts('Connections', [
          { stroke: '#3498db', label: 'current', fill: 'rgba(52, 152, 219, 0.1)' }
        ], width),
        [[], []],
        connectionsEl
      );
    }

    // Update charts with new data
    function updateCharts(data) {
      if (!charts.throughput) {
        initCharts();
        if (!charts.throughput) return;
      }

      const now = Date.now() / 1000;

      // Add new data points
      chartData.throughput.timestamps.push(now);
      chartData.throughput.values.push(data.throughput || 0);

      chartData.latency.timestamps.push(now);
      chartData.latency.p50.push(data.latency_p50 || 0);
      chartData.latency.p95.push(data.latency_p95 || 0);
      chartData.latency.p99.push(data.latency_p99 || 0);

      chartData.memory.timestamps.push(now);
      chartData.memory.used.push((data.memory_used || 0) / (1024 * 1024)); // Convert to MB
      chartData.memory.peak.push((data.memory_peak || 0) / (1024 * 1024));

      chartData.connections.timestamps.push(now);
      chartData.connections.current.push(data.connections_current || 0);

      // Trim to max points
      Object.keys(chartData).forEach(key => {
        Object.keys(chartData[key]).forEach(series => {
          if (chartData[key][series].length > MAX_POINTS) {
            chartData[key][series].shift();
          }
        });
      });

      // Update chart data
      charts.throughput.setData([
        chartData.throughput.timestamps,
        chartData.throughput.values
      ]);

      charts.latency.setData([
        chartData.latency.timestamps,
        chartData.latency.p50,
        chartData.latency.p95,
        chartData.latency.p99
      ]);

      charts.memory.setData([
        chartData.memory.timestamps,
        chartData.memory.used,
        chartData.memory.peak
      ]);

      charts.connections.setData([
        chartData.connections.timestamps,
        chartData.connections.current
      ]);
    }

    // Alpine.js component
    function debugDashboard() {
      return {
        tab: 'cluster',
        serverInfo: {
          version: '-'
        },

        init() {
          // Fetch server info
          fetch('/debug/api/cluster')
            .then(r => r.json())
            .then(data => {
              this.serverInfo.version = data.version || '-';
            })
            .catch(() => {});

          // Listen for tab changes to initialize charts
          this.$watch('tab', (value) => {
            if (value === 'metrics') {
              setTimeout(initCharts, 100);
            }
          });

          // Listen for HTMX requests to update charts
          document.body.addEventListener('htmx:afterSwap', (evt) => {
            if (evt.detail.target.id === 'metrics-container') {
              const metricsData = evt.detail.target.querySelector('[data-metrics]');
              if (metricsData) {
                try {
                  const data = JSON.parse(metricsData.dataset.metrics);
                  updateCharts(data);
                } catch (e) {
                  console.error('Failed to parse metrics data', e);
                }
              }
            }
          });

          // Listen for generate-bundle custom event from partial
          window.addEventListener('generate-bundle', (evt) => {
            this.generateBundle(evt.detail);
          });
        },

        async generateBundle(duration) {
          // Show generating toast
          this.showToast('Generating bundle...', 'info', true);

          try {
            const url = `/debug/api/bundle/generate${duration > 0 ? `?duration=${duration}` : ''}`;
            const response = await fetch(url);

            if (response.ok) {
              // Download the file
              const blob = await response.blob();
              const disposition = response.headers.get('content-disposition');
              const filename = disposition?.match(/filename="?([^"]+)"?/)?.[1] || 'bundle.zip';

              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = filename;
              a.click();
              URL.revokeObjectURL(a.href);

              // Show success toast
              this.showToast('Bundle generated successfully!', 'success');

              // Trigger bundle list refresh
              htmx.trigger(document.body, 'bundleRefresh');
            } else {
              const text = await response.text();
              this.showToast(`Error: ${text}`, 'error');
            }
          } catch (e) {
            this.showToast(`Error: ${e.message}`, 'error');
          }
        },

        showToast(message, type = 'info', loading = false) {
          const container = document.getElementById('toast-container');
          // Remove existing toasts
          container.innerHTML = '';

          const toast = document.createElement('div');
          toast.className = `toast toast-${type}`;
          toast.innerHTML = loading
            ? `<span class="toast-spinner"></span>${message}`
            : message;

          container.appendChild(toast);

          if (!loading) {
            setTimeout(() => toast.remove(), 4000);
          }
        }
      };
    }

    // Handle window resize for charts
    window.addEventListener('resize', () => {
      Object.values(charts).forEach(chart => {
        if (chart && chart.root) {
          const container = chart.root.parentElement;
          if (container) {
            const width = Math.min(container.clientWidth || 500, 600);
            chart.setSize({ width, height: 200 });
          }
        }
      });
    });
  </script>

  <style>
    [x-cloak] { display: none !important; }
  </style>
</body>
</html>
