# FrogDB Async Durability Configuration
#
# Maximum throughput, lowest durability.
# Writes are buffered in memory and flushed periodically by RocksDB.
# Data may be lost on crash (up to RocksDB's write buffer).
#
# Use case: Caching, session stores, non-critical data.

[server]
bind = "127.0.0.1"
port = 6379
num-shards = 4

[persistence]
enabled = true
data-dir = "/tmp/frogdb-bench-async"
durability-mode = "async"
# No explicit sync - rely on OS/RocksDB background flush
write-buffer-size-mb = 64
compression = "lz4"
# Large batch threshold - accumulate writes
batch-size-threshold-kb = 4096
batch-timeout-ms = 100

[snapshot]
# Disable automatic snapshots for benchmarks (interval = 0)
snapshot-interval-secs = 0

[logging]
level = "warn"

[metrics]
enabled = false

[memory]
maxmemory = 0  # No limit for benchmarks
