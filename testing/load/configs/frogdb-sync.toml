# FrogDB Sync Durability Configuration
#
# Maximum durability, lowest throughput.
# Every write is synced to disk before acknowledging.
# No data loss on crash.
#
# Use case: Financial transactions, critical data.

[server]
bind = "127.0.0.1"
port = 6379
num-shards = 4

[persistence]
enabled = true
data-dir = "/tmp/frogdb-bench-sync"
durability-mode = "sync"
write-buffer-size-mb = 64
compression = "lz4"
# Small batch - flush frequently
batch-size-threshold-kb = 1
batch-timeout-ms = 0

[snapshot]
# Disable automatic snapshots for benchmarks (interval = 0)
snapshot-interval-secs = 0

[logging]
level = "warn"

[metrics]
enabled = false

[memory]
maxmemory = 0  # No limit for benchmarks
