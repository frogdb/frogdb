name: Blacksmith Testbox
on:
  workflow_dispatch:
    inputs:
      testbox_id:
        type: string
        description: "Testbox session ID"
        required: true
env:
  CARGO_TERM_COLOR: always
  # Incremental artifacts are large and mostly useless across testbox sessions;
  # keeping them off keeps the sticky disks (billed per GB stored) lean.
  CARGO_INCREMENTAL: "0"
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    steps:
      - name: Begin Testbox
        uses: useblacksmith/begin-testbox@v2
        with:
          testbox_id: ${{ inputs.testbox_id }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # Sticky disks replace Swatinem/rust-cache here: the last committed snapshot
      # mounts in seconds regardless of size, and the commit happens at VM teardown
      # even though testbox jobs always end by cancellation (stop or idle-timeout).
      # Caveat: freshly committed snapshots take ~10-15 min to become the clone
      # base, so a re-warm shortly after a stop sees the previous snapshot (mild
      # staleness; the prebuild step below recompiles the delta).
      - name: Mount target sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-testbox-arm-target
          path: ./target
      - name: Mount cargo registry sticky disk
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-testbox-arm-cargo-registry
          path: /home/runner/.cargo/registry
      - name: Set up mise toolchain
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          install: 'true'
          install_args: just cargo:cargo-nextest
          cache: 'true'
          experimental: 'true'
      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@1.92.0
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev pkg-config libssl-dev
      - name: Prebuild workspace test binaries
        run: cargo nextest run --no-run --workspace
      - name: Run Testbox
        uses: useblacksmith/run-testbox@v2
        if: always()
