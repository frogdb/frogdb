name: Coverage Nightly
'on':
  schedule:
  - cron: '50 4 * * *'
  workflow_dispatch: {}
jobs:
  coverage:
    name: Nightly Code Coverage
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 180
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Configure self-hosted build environment
      if: runner.environment == 'self-hosted'
      run: |
        {
          echo "CC=clang-18"
          echo "CXX=clang++-18"
          echo "LIBCLANG_PATH=/usr/lib/llvm-18/lib"
          echo "CARGO_BUILD_JOBS=4"
        } >> "$GITHUB_ENV"
    - name: Set up mise toolchain
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      with:
        install: 'true'
        install_args: just cargo:cargo-nextest
        cache: 'true'
        experimental: 'true'
    - name: Install Rust 1.92.0
      uses: dtolnay/rust-toolchain@1.92.0
      with:
        components: llvm-tools-preview
    - name: Install libclang
      if: runner.environment != 'self-hosted'
      run: sudo apt-get install -y libclang-dev
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9
      with:
        tool: cargo-llvm-cov
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      with:
        shared-key: coverage
    - name: Generate coverage report
      run: just coverage-lcov
    - name: Coverage summary
      if: always()
      run: |
        set -uo pipefail
        if [ ! -f "target/llvm-cov/lcov.info" ]; then
          echo "### Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo "lcov report not found at target/llvm-cov/lcov.info - coverage generation failed." \
            >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        read -r lh lf <<< "$(awk -F: '
          /^LH:/ { lh += $2 }
          /^LF:/ { lf += $2 }
          END { print lh, lf }
        ' target/llvm-cov/lcov.info)"
        pct=$(awk -v lh="$lh" -v lf="$lf" 'BEGIN { printf "%.1f", (lf > 0) ? (lh / lf * 100) : 0 }')
        cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
        ### Coverage summary

        Total line coverage: **${pct}%** (${lh}/${lf} lines)

        Baseline (2026-07-22 audit, .scratch/testing-improvements/audit/coverage-summary.md): **84.0%**

        Per-crate baseline table and worst-file follow-up candidates (server/src/commands/info.rs,
        connection/builder.rs, config/loader.rs, core/src/store/mod.rs, etc.) are tracked in that
        same file - not required to be fixed as part of this job.
        SUMMARY
    - name: Upload coverage-lcov
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: coverage-lcov
        path: target/llvm-cov/lcov.info
        retention-days: '7'
        if-no-files-found: error
