name: Test
env:
  CARGO_TERM_COLOR: always
'on':
  workflow_dispatch: {}
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      grafana: ${{ steps.filter.outputs.grafana }}
      helm: ${{ steps.filter.outputs.helm }}
      python: ${{ steps.filter.outputs.python }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - id: filter
      name: Check changed paths
      uses: dorny/paths-filter@v3
      with:
        filters: |
          workflows:
            - '.github/**'
          grafana:
            - 'frogdb-server/ops/grafana/**'
          helm:
            - 'frogdb-server/ops/deploy/helm/**'
          python:
            - '**/*.py'
  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run actionlint
      uses: raven-actions/actionlint@v2
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Run unit tests
      run: cargo nextest run --all
  shuttle-tests:
    name: Shuttle Concurrency Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: shuttle
    - name: Run Shuttle concurrency tests
      run: cargo nextest run -p frogdb-core --features shuttle -E 'test(/concurrency/)'
  turmoil-tests:
    name: Turmoil Simulation Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: turmoil
    - name: Run Turmoil simulation tests
      run: cargo nextest run -p frogdb-server --features turmoil -E 'test(/simulation/)'
  helm-gen-check:
    name: Helm Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check Helm files are up to date
      run: cargo run -p helm-gen -- -o frogdb-server/ops/deploy/helm/frogdb --check
  dashboard-gen-check:
    name: Dashboard Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check Grafana dashboard is up to date
      run: cargo run -p dashboard-gen -- -o frogdb-server/ops/grafana/frogdb-overview.json --check
  dashboard-lint:
    needs: changes
    if: needs.changes.outputs.grafana == 'true'
    name: Grafana Dashboard Lint
    runs-on: ubuntu-latest
    steps:
