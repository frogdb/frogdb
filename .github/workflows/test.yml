name: Test
env:
  CARGO_TERM_COLOR: always
'on':
  workflow_dispatch: {}
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
      grafana: ${{ steps.filter.outputs.grafana }}
      helm: ${{ steps.filter.outputs.helm }}
      python: ${{ steps.filter.outputs.python }}
      workflow_gen: ${{ steps.filter.outputs.workflow_gen }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - id: filter
      name: Check changed paths
      uses: dorny/paths-filter@v4
      with:
        filters: |
          rust:
            - 'frogdb-server/**'
            - 'frogctl/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'rust-toolchain.toml'
            - '.cargo/**'
            - '.config/nextest.toml'
          workflows:
            - '.github/**'
          grafana:
            - 'frogdb-server/ops/grafana/**'
          helm:
            - 'frogdb-server/ops/deploy/helm/**'
          python:
            - '**/*.py'
          workflow_gen:
            - '.github/workflows/workflow_gen/**'
            - 'Justfile'
  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run actionlint
      uses: raven-actions/actionlint@v2
  lint:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Install cargo-deny
      uses: taiki-e/install-action@cargo-deny
    - name: Check licenses and advisories
      run: cargo deny check --config frogdb-server/deny.toml
  unit-tests:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Run unit tests
      run: cargo nextest run --all
  shuttle-tests:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Shuttle Concurrency Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: shuttle
    - name: Run Shuttle concurrency tests
      run: cargo nextest run -p frogdb-core --features shuttle -E 'test(/concurrency/)'
  turmoil-tests:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Turmoil Simulation Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: turmoil
    - name: Run Turmoil simulation tests
      run: cargo nextest run -p frogdb-server --features turmoil -E 'test(/simulation/)'
  helm-gen-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Helm Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check Helm files are up to date
      run: cargo run -p helm-gen -- -o frogdb-server/ops/deploy/helm/frogdb --check
  dashboard-gen-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Dashboard Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check Grafana dashboard is up to date
      run: cargo run -p dashboard-gen -- -o frogdb-server/ops/grafana/frogdb-overview.json --check
  dashboard-lint:
    needs: changes
    if: needs.changes.outputs.grafana == 'true'
    name: Grafana Dashboard Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        cache: 'false'
    - name: Cache dashboard-linter
      uses: actions/cache@v5
      with:
        path: ~/go/bin/dashboard-linter
        key: dashboard-linter-${{ runner.os }}
    - name: Install dashboard-linter
      run: test -x ~/go/bin/dashboard-linter || go install github.com/grafana/dashboard-linter@latest
    - name: Lint Grafana dashboard
      run: dashboard-linter lint --strict frogdb-server/ops/grafana/frogdb-overview.json
  docs-gen-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    name: Docs Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable
    - name: Check docs config reference is up to date
      run: cargo run -p docs-gen -- --check
  workflow-gen-check:
    needs: changes
    if: needs.changes.outputs.workflow_gen == 'true'
    name: Workflow Generation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install just
      uses: extractions/setup-just@v3
    - name: Check workflow files are up to date
      run: just workflow-gen --check
  python-lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Run ruff linter
      run: uvx ruff check
    - name: Check ruff formatting
      run: uvx ruff format --check
  helm-lint:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.13.0
    - name: Lint Helm chart
      run: helm lint frogdb-server/ops/deploy/helm/frogdb
    - name: Template Helm chart
      run: helm template frogdb frogdb-server/ops/deploy/helm/frogdb --debug
    - name: Template cluster preset
      run: helm template frogdb frogdb-server/ops/deploy/helm/frogdb -f frogdb-server/ops/deploy/helm/frogdb/values-cluster.yaml --debug
  ci-pass:
    needs:
    - actionlint
    - lint
    - unit-tests
    - shuttle-tests
    - turmoil-tests
    - helm-gen-check
    - dashboard-gen-check
    - dashboard-lint
    - docs-gen-check
    - workflow-gen-check
    - python-lint
    - helm-lint
    if: always()
    name: CI Pass
    runs-on: ubuntu-latest
    steps:
    - name: Check results
      if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: exit 1
