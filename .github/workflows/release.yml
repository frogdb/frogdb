name: Release
env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
'on':
  workflow_dispatch: {}
jobs:
  build-binaries:
    name: Build Release Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - arch: amd64
          ext: ''
          os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
        - arch: arm64
          ext: ''
          os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
        - arch: amd64
          ext: ''
          os: macos-latest
          target: x86_64-apple-darwin
        - arch: arm64
          ext: ''
          os: macos-latest
          target: aarch64-apple-darwin
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Install cargo-zigbuild (Linux)
      if: runner.os == 'Linux'
      run: cargo install cargo-zigbuild
    - name: Install Zig (Linux)
      if: runner.os == 'Linux'
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: '0.11.0'
    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: cargo zigbuild --release --target ${{ matrix.target }} --bin frogdb-server
    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: cargo build --release --target ${{ matrix.target }} --bin frogdb-server
    - name: Create release archive
      run: |-
        cd target/${{ matrix.target }}/release
        tar -czvf ../../../frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz frogdb-server${{ matrix.ext }}
    - name: Upload frogdb-${{ matrix.target }}
      uses: actions/upload-artifact@v4
      with:
        name: frogdb-${{ matrix.target }}
        path: frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
        retention-days: '7'
  docker:
    needs:
    - build-binaries
    name: Docker Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download frogdb-x86_64-unknown-linux-gnu
      uses: actions/download-artifact@v4
      with:
        name: frogdb-x86_64-unknown-linux-gnu
        path: binaries/amd64
    - name: Download frogdb-aarch64-unknown-linux-gnu
      uses: actions/download-artifact@v4
      with:
        name: frogdb-aarch64-unknown-linux-gnu
        path: binaries/arm64
    - name: Extract binaries
      run: |-
        cd binaries/amd64 && tar -xzf *.tar.gz && mv frogdb-server ../amd64-binary
        cd ../arm64 && tar -xzf *.tar.gz && mv frogdb-server ../arm64-binary
        mv binaries/amd64-binary binaries/amd64/frogdb-server
        mv binaries/arm64-binary binaries/arm64/frogdb-server
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - id: meta
      name: Extract metadata
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
    - name: Build and push multi-arch image
      uses: docker/build-push-action@v5
      with:
        context: '.'
        file: './Dockerfile.multiarch'
        platforms: linux/amd64,linux/arm64
        push: 'true'
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |-
          BINARY_AMD64=binaries/amd64/frogdb-server
          BINARY_ARM64=binaries/arm64/frogdb-server
  helm:
    needs:
    - docker
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.13.0
    - name: Package Helm chart
      run: |-
        helm package deploy/helm/frogdb --destination .helm-packages
        helm repo index .helm-packages --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
    - name: Checkout gh-pages branch
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
    - name: Update Helm repository
      run: |-
        mkdir -p gh-pages/helm
        cp .helm-packages/*.tgz gh-pages/helm/
        # Merge index files
        if [ -f gh-pages/helm/index.yaml ]; then
          helm repo index gh-pages/helm --merge gh-pages/helm/index.yaml --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        else
          helm repo index gh-pages/helm --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        fi
    - name: Commit and push
      run: |-
        cd gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add helm/
        git commit -m "Release Helm chart ${{ github.ref_name }}" || echo "No changes"
        git push
  github-release:
    needs:
    - build-binaries
    - docker
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        draft: 'false'
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: 'true'
        files: artifacts/frogdb-*/*.tar.gz
