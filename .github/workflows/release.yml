name: Release
env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
'on':
  workflow_dispatch: {}
jobs:
  docker:
    name: Docker Release & Linux Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - id: meta
      name: Extract metadata
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
    - name: Build and push multi-arch image
      uses: docker/build-push-action@v5
      with:
        context: '.'
        file: './frogdb-server/docker/Dockerfile.builder'
        platforms: linux/amd64,linux/arm64
        push: 'true'
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Extract Linux binaries from image
      run: |-
        IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        for arch in amd64 arm64; do
          docker pull --platform linux/${arch} ${IMAGE}
          CONTAINER=$(docker create --platform linux/${arch} ${IMAGE})
          docker cp ${CONTAINER}:/usr/local/bin/frogdb-server ./frogdb-server
          docker rm ${CONTAINER}
          tar -czvf frogdb-${{ github.ref_name }}-linux-${arch}.tar.gz frogdb-server
          rm frogdb-server
        done
    - name: Upload frogdb-linux-amd64
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-linux-amd64
        path: frogdb-${{ github.ref_name }}-linux-amd64.tar.gz
        retention-days: '7'
    - name: Upload frogdb-linux-arm64
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-linux-arm64
        path: frogdb-${{ github.ref_name }}-linux-arm64.tar.gz
        retention-days: '7'
  build-macos:
    name: Build macOS Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - arch: amd64
          ext: ''
          os: macos-latest
          target: x86_64-apple-darwin
        - arch: arm64
          ext: ''
          os: macos-latest
          target: aarch64-apple-darwin
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |-
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-release-${{ matrix.target }}-
    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --bin frogdb-server
    - name: Create release archive
      run: |-
        cd target/${{ matrix.target }}/release
        tar -czvf ../../../frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz frogdb-server${{ matrix.ext }}
    - name: Upload frogdb-${{ matrix.target }}
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-${{ matrix.target }}
        path: frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
        retention-days: '7'
  helm:
    needs:
    - docker
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.13.0
    - name: Package Helm chart
      run: |-
        helm package frogdb-server/ops/deploy/helm/frogdb --destination .helm-packages
        helm repo index .helm-packages --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
    - name: Checkout gh-pages branch
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
    - name: Update Helm repository
      run: |-
        mkdir -p gh-pages/helm
        cp .helm-packages/*.tgz gh-pages/helm/
        # Merge index files
        if [ -f gh-pages/helm/index.yaml ]; then
          helm repo index gh-pages/helm --merge gh-pages/helm/index.yaml --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        else
          helm repo index gh-pages/helm --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        fi
    - name: Commit and push
      run: |-
        cd gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add helm/
        git commit -m "Release Helm chart ${{ github.ref_name }}" || echo "No changes"
        git push
  github-release:
    needs:
    - docker
    - build-macos
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        draft: 'false'
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: 'true'
        files: artifacts/frogdb-*/*.tar.gz
