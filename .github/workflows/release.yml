name: Release
env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
'on':
  push:
    tags:
    - v*
  workflow_dispatch: {}
jobs:
  docker:
    name: Docker Release & Linux Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - id: meta
      name: Extract metadata
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
    - name: Build and push multi-arch image
      uses: docker/build-push-action@v7
      with:
        context: '.'
        file: './frogdb-server/docker/Dockerfile.builder'
        platforms: linux/amd64,linux/arm64
        push: 'true'
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Extract Linux binaries from image
      run: |-
        IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        BINARIES="frogdb-server frog frogdb-admin"
        for arch in amd64 arm64; do
          docker pull --platform linux/${arch} ${IMAGE}
          CONTAINER=$(docker create --platform linux/${arch} ${IMAGE})
          for bin in ${BINARIES}; do
            docker cp ${CONTAINER}:/usr/local/bin/${bin} ./${bin}
          done
          docker rm ${CONTAINER}
          tar -czvf frogdb-${{ github.ref_name }}-linux-${arch}.tar.gz ${BINARIES}
          rm ${BINARIES}
        done
    - name: Upload frogdb-linux-amd64
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-linux-amd64
        path: frogdb-${{ github.ref_name }}-linux-amd64.tar.gz
        retention-days: '7'
    - name: Upload frogdb-linux-arm64
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-linux-arm64
        path: frogdb-${{ github.ref_name }}-linux-arm64.tar.gz
        retention-days: '7'
  build-macos:
    name: Build macOS Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - arch: amd64
          ext: ''
          os: macos-latest
          target: x86_64-apple-darwin
        - arch: arm64
          ext: ''
          os: macos-latest
          target: aarch64-apple-darwin
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: release-${{ matrix.target }}
    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --bin frogdb-server --bin frog --bin frogdb-admin
    - name: Create release archive
      run: |-
        cd target/${{ matrix.target }}/release
        tar -czvf ../../../frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz frogdb-server${{ matrix.ext }} frog${{ matrix.ext }} frogdb-admin${{ matrix.ext }}
    - name: Upload frogdb-${{ matrix.target }}
      uses: actions/upload-artifact@v7
      with:
        name: frogdb-${{ matrix.target }}
        path: frogdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
        retention-days: '7'
  helm:
    needs:
    - docker
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: '0'
    - name: Install Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.13.0
    - name: Package Helm chart
      run: |-
        helm package frogdb-server/ops/deploy/helm/frogdb --destination .helm-packages
        helm repo index .helm-packages --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
    - name: Checkout gh-pages branch
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: gh-pages
    - name: Update Helm repository
      run: |-
        mkdir -p gh-pages/helm
        cp .helm-packages/*.tgz gh-pages/helm/
        # Merge index files
        if [ -f gh-pages/helm/index.yaml ]; then
          helm repo index gh-pages/helm --merge gh-pages/helm/index.yaml --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        else
          helm repo index gh-pages/helm --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/helm
        fi
    - name: Commit and push
      run: |-
        cd gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add helm/
        git commit -m "Release Helm chart ${{ github.ref_name }}" || echo "No changes"
        git push
  github-release:
    needs:
    - docker
    - build-macos
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Install cosign
      uses: sigstore/cosign-installer@v3
    - name: Generate checksums
      run: |-
        cd artifacts
        sha256sum frogdb-*/*.tar.gz > ../sha256sums.txt
        mv ../sha256sums.txt .
    - name: Sign artifacts with cosign
      run: |-
        cd artifacts
        for f in frogdb-*/*.tar.gz; do
          cosign sign-blob --yes --bundle "${f}.bundle" "${f}"
        done
        cosign sign-blob --yes --bundle sha256sums.txt.bundle sha256sums.txt
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: 'false'
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: 'true'
        files: |-
          artifacts/frogdb-*/*.tar.gz
          artifacts/frogdb-*/*.tar.gz.bundle
          artifacts/sha256sums.txt
          artifacts/sha256sums.txt.bundle
  homebrew:
    needs:
    - github-release
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Compute SHA256 and update formula
      run: |-
        VERSION="${GITHUB_REF_NAME#v}"

        SHA_LINUX_AMD64=$(sha256sum artifacts/frogdb-linux-amd64/*.tar.gz | awk '{print $1}')
        SHA_LINUX_ARM64=$(sha256sum artifacts/frogdb-linux-arm64/*.tar.gz | awk '{print $1}')
        SHA_MACOS_X86=$(sha256sum artifacts/frogdb-x86_64-apple-darwin/*.tar.gz | awk '{print $1}')
        SHA_MACOS_ARM=$(sha256sum artifacts/frogdb-aarch64-apple-darwin/*.tar.gz | awk '{print $1}')

        sed -e "s/{{version}}/${VERSION}/g" \
            -e "s/{{sha256_linux_amd64}}/${SHA_LINUX_AMD64}/g" \
            -e "s/{{sha256_linux_arm64}}/${SHA_LINUX_ARM64}/g" \
            -e "s/{{sha256_macos_x86_64}}/${SHA_MACOS_X86}/g" \
            -e "s/{{sha256_macos_aarch64}}/${SHA_MACOS_ARM}/g" \
            .github/homebrew/frogdb.rb.template > frogdb.rb
    - name: Push formula to Homebrew tap
      run: |-
        git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ github.repository_owner }}/homebrew-tap.git tap
        mkdir -p tap/Formula
        cp frogdb.rb tap/Formula/frogdb.rb
        cd tap
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add Formula/frogdb.rb
        git commit -m "Update frogdb to ${GITHUB_REF_NAME}" || echo "No changes"
        git push
