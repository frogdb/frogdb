name: Debug libclang
'on':
  pull_request:
    paths:
    - '.github/workflows/debug-libclang.yml'
    - 'Justfile'
permissions:
  contents: read
jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up mise toolchain
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      with:
        install: 'true'
        install_args: node bun python uv just
        cache: 'true'
        experimental: 'true'
    - name: Install Rust 1.92.0
      uses: dtolnay/rust-toolchain@1.92.0
    - name: Install libclang
      run: sudo apt-get install -y libclang-dev
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      with:
        shared-key: stable
    - name: Show resolved LIBCLANG_PATH
      run: just --evaluate LIBCLANG_PATH
    - name: Install site dependencies
      run: just docs-install
    - name: Build documentation site
      run: just docs-build
