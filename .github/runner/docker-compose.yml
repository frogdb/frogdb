services:
  runner:
    build: .
    image: frogdb-runner:local
    restart: unless-stopped
    env_file: .env
    environment:
      REPO_URL: https://github.com/frogdb/frogdb
      RUNNER_NAME: frogdb-local
      RUNNER_WORKDIR: /tmp/github-runner
      LABELS: self-hosted,linux,x64
      EPHEMERAL: "false"
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/github-runner
    security_opt:
      - label:disable
volumes:
  runner-work:
