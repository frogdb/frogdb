services:
  cache-server:
    image: ghcr.io/falcondev-oss/github-actions-cache-server:latest
    restart: unless-stopped
    environment:
      API_BASE_URL: http://cache-server:3000
      STORAGE_DRIVER: filesystem
      STORAGE_FILESYSTEM_PATH: /data/cache
      DB_DRIVER: sqlite
      DB_SQLITE_PATH: /data/cache-server.db
    volumes:
      - cache-data:/data

  runner:
    build: .
    image: frogdb-runner:local
    restart: unless-stopped
    env_file: .env
    environment:
      REPO_URL: https://github.com/frogdb/frogdb
      RUNNER_NAME_PREFIX: frogdb
      RUNNER_WORKDIR: /tmp/github-runner
      LABELS: self-hosted,linux,x64
      EPHEMERAL: "false"
      DISABLE_AUTO_UPDATE: "true"
      ACTIONS_RESULTS_URL: http://cache-server:3000/
      ACTIONS_CACHE_URL: http://cache-server:3000/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - cache-server
    security_opt:
      - label:disable

volumes:
  cache-data:
