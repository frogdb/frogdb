name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or commands to reproduce the issue.
      placeholder: |
        1. Connect to FrogDB with `redis-cli`
        2. Run `SET foo bar`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FrogDB Version
      description: Output of `frogdb-server --version` or commit SHA.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: e.g. Ubuntu 24.04, macOS 15, Docker
    validations:
      required: false
