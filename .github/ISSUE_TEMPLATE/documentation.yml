name: Documentation
description: Report missing, incorrect, or unclear documentation
labels: ["documentation"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Missing documentation
        - Incorrect documentation
        - Unclear / confusing
        - Improvement suggestion
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: Link to the page or file path, if applicable.
      placeholder: e.g. website/src/content/docs/guides/commands.md or https://frogdb.dev/...
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be added, corrected, or clarified?
    validations:
      required: true
