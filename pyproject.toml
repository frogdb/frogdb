[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — formatter handles what it can, the rest is fine
    "SIM102", # nested if — often more readable than combined conditions
    "SIM105", # contextlib.suppress — try/except/pass is clearer in scripts
    "SIM108", # ternary — if/else blocks are fine
    "SIM115", # context manager for open — not always applicable
]

[tool.ruff.lint.isort]
known-first-party = ["workflow_gen"]
