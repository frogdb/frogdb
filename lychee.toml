# Lychee link checker configuration
# https://lychee.cli.rs/

# Skip external URLs that are known to rate-limit CI or require auth
exclude = [
    # GitHub rate-limits unauthenticated requests
    "https://github.com/.*",
    "https://raw.githubusercontent.com/.*",
    # localhost examples in docs
    "http://localhost.*",
    "http://127\\.0\\.0\\.1.*",
    # Docker registry
    "https://ghcr\\.io/.*",
    # Home link without trailing slash (Starlight logo link; validated by build)
    "file://.*/frogdb$",
    # Canonical/og:url self-references point at the live site, which 404s for
    # any page added or moved in the current change until it deploys; internal
    # links are validated by the Starlight build instead
    "https://frogdb\\.dev/.*",
]

# Accept these status codes as valid
accept = [200, 206, 429]

# Timeout per request
timeout = 30

# Max concurrent requests
max_concurrency = 4

# Don't check mail addresses
include_mail = false

