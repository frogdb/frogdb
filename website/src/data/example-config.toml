# FrogDB Configuration File
#
# This file is generated by serializing `Config::default()` to TOML — it is
# NOT a hand-maintained copy, so it cannot drift from the real defaults the
# server actually uses (see `default_toml_impl()` in
# frogdb-server/crates/server/src/config/loader.rs). Regenerate an identical
# copy at any time with `frogdb-server --generate-config`.
#
# Optional fields whose default is "unset" (e.g. tls.ca-file,
# tls.client-cert-file, tls.client-key-file, http.token, logging.file-path,
# logging.rotation) are omitted below — TOML has no null literal, so an
# unset value is represented by the key's absence. See reference/configuration
# for their syntax and defaults.

[server]
bind = "127.0.0.1"
port = 6379
num-shards = 1
allow-cross-slot-standalone = false
scatter-gather-timeout-ms = 5000
sorted-set-index = "skiplist"
max-clients = 10000
enable-debug-command = false

[logging]
level = "info"
format = "pretty"
output = "stdout"
per-request-spans = false

[persistence]
enabled = true
mode = "rocksdb"
data-dir = "./frogdb-data"
durability-mode = "periodic"
sync-interval-ms = 1000
write-buffer-size-mb = 64
compression = "lz4"
block-cache-size-mb = 256
bloom-filter-bits = 10
max-write-buffer-number = 4
compaction-rate-limit-mb = 0
flush-compact-range = true
batch-size-threshold-kb = 4096
batch-timeout-ms = 10
wal-failure-policy = "continue"

[snapshot]
snapshot-dir = "./snapshots"
snapshot-interval-secs = 3600
max-snapshots = 5

[http]
enabled = true
bind = "127.0.0.1"
port = 9090

[metrics]
enabled = true
port = 9090
otlp-enabled = false
otlp-endpoint = "http://localhost:4317"
otlp-interval-secs = 15

[admin]
enabled = false
port = 6382
bind = "127.0.0.1"

[tracing]
enabled = false
otlp-endpoint = "http://localhost:4317"
sampling-rate = 1.0
service-name = "frogdb"
scatter-gather-spans = false
shard-spans = false
persistence-spans = false
recent-traces-max = 100

[memory]
maxmemory = 0
maxmemory-policy = "noeviction"
maxmemory-samples = 5
lfu-log-factor = 10
lfu-decay-time = 1
doctor-big-key-threshold = 1048576
doctor-max-big-keys = 100
doctor-imbalance-threshold = 25.0
maxmemory-clients = "0"

[security]
requirepass = ""

[acl]
aclfile = ""
log-max-len = 128

[blocking]
max-waiters-per-key = 10000
max-blocked-connections = 50000

[replication]
role = "standalone"
primary-host = ""
primary-port = 6379
min-replicas-to-write = 0
min-replicas-timeout-ms = 5000
ack-interval-ms = 1000
state-file = "replication_state.json"
connect-timeout-ms = 5000
handshake-timeout-ms = 10000
reconnect-backoff-initial-ms = 100
reconnect-backoff-max-ms = 30000
replication-lag-threshold-bytes = 0
replication-lag-threshold-secs = 0
fullresync-cooldown-secs = 60
split-brain-log-enabled = true
split-brain-buffer-size = 10000
split-brain-buffer-max-mb = 64
self-fence-on-replica-loss = true
replica-freshness-timeout-ms = 3000
replica-write-timeout-ms = 5000

[slowlog]
log-slower-than = 10000
max-len = 128
max-arg-len = 128

[json]
max-depth = 128
max-size = 67108864

[cluster]
enabled = false
node-id = 0
client-addr = ""
cluster-bus-addr = "127.0.0.1:16379"
initial-nodes = []
data-dir = "./frogdb-cluster"
election-timeout-ms = 1000
heartbeat-interval-ms = 250
connect-timeout-ms = 5000
request-timeout-ms = 10000
auto-failover = false
fail-threshold = 5
self-fence-on-quorum-loss = true
replica-priority = 100

[status]
memory-warning-percent = 90
connection-warning-percent = 90
durability-lag-warning-ms = 5000
durability-lag-critical-ms = 30000

[latency]
startup-test = false
startup-test-duration-secs = 5
warning-threshold-us = 2000

[latency-bands]
enabled = false
bands = [1, 5, 10, 50, 100, 500]

[debug-bundle]
directory = "frogdb-data/bundles"
max-bundles = 10
bundle-ttl-secs = 3600
max-slowlog-entries = 256
max-trace-entries = 100

[compat]
strict-config = false

[tiered-storage]
enabled = false

[monitor]
channel-capacity = 4096

[tls]
enabled = false
cert-file = ""
key-file = ""
tls-port = 6380
require-client-cert = "none"
protocols = ["1.3", "1.2"]
ciphersuites = []
tls-replication = false
tls-cluster = false
tls-cluster-migration = false
no-tls-on-admin-port = true
no-tls-on-http = true
watch-certs = true
watch-debounce-ms = 500
handshake-timeout-ms = 10000

